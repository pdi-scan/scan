<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Scanner</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body { margin:0; font-family:-apple-system; background:#111; color:white; text-align:center; }
header { padding:12px; font-weight:800; background:#000; }
input, button {
  width:90%; max-width:420px;
  padding:14px; margin:8px auto;
  border-radius:10px; border:none;
  font-size:16px; font-weight:700;
}
#scanInput { position:absolute; opacity:0; }
#status { margin:10px auto; padding:10px; border-radius:12px; font-weight:800; }
.status-ready { background:#16a34a; }
.status-stopped { background:#dc2626; }
.status-sync { background:#ca8a04; }
#toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%);
  background:#111827; padding:12px;
  border-radius:10px; opacity:0;
}
#toast.show { opacity:1; }
</style>
</head>

<body>

<header>📦 Scanner</header>
<div id="status" class="status-stopped">🔴 Stopped</div>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1">

<button onclick="clearSession()">Clear</button>

<input id="scanInput" autocomplete="off">

<div id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* REGISTER SW (SAFE) */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* DOM */
const userEl = document.getElementById("user");
const poEl = document.getElementById("po");
const qtyEl = document.getElementById("qty");
const scanInput = document.getElementById("scanInput");
const statusEl = document.getElementById("status");

/* STATE */
let active = false;
let sending = false;
let userLocked = false;

/* STATUS */
function setStatus(type,text){
  statusEl.className="";
  statusEl.classList.add("status-"+type);
  statusEl.innerText=text;
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
  if(navigator.vibrate) navigator.vibrate(80);
}

/* AUTO START */
function checkAutoStart(){
  if(userEl.value.trim() && poEl.value.trim()){
    if(!active) startScanner();
  } else stopScanner();
}
userEl.oninput = poEl.oninput = checkAutoStart;

/* START */
function startScanner(){
  active = true;
  scanInput.focus();
  setStatus("ready","🟢 Ready");
}

/* STOP */
function stopScanner(){
  active = false;
  scanInput.blur();
  setStatus("stopped","🔴 Stopped");
}

/* CLEAR */
function clearSession(){
  userEl.value="";
  poEl.value="";
  qtyEl.value=1;

  userLocked=false;
  userEl.readOnly=false;
  userEl.style.opacity="1";

  stopScanner();
  showToast("Cleared");
}

/* LOCK USER */
userEl.addEventListener("focus",()=>{
  if(userLocked){
    userEl.blur();
    showToast("User locked");
  }
});

/* KEEP FOCUS */
setInterval(()=>{
  if(active && document.activeElement!==scanInput){
    scanInput.focus();
  }
},500);

/* SCAN */
scanInput.addEventListener("keydown",(e)=>{
  if(!active) return;

  if(e.key==="Enter"){
    const value=scanInput.value.trim();
    scanInput.value="";
    if(value) handleScan(value);
  }
});

/* HANDLE */
async function handleScan(text){
  if(sending) return;
  sending = true;

  try {

    if(!userLocked){
      userLocked=true;
      userEl.readOnly=true;
      userEl.style.opacity="0.6";
    }

    showToast("Scanned: "+text);
    await send(text);

  } finally {
    sending = false;
  }
}

/* SEND (SAFE FETCH) */
async function send(itemId){

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&po=" + encodeURIComponent(poEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  try {
    const r = await fetch(url, {
      method: "GET",
      redirect: "follow",
      cache: "no-store"
    });

    const text = await r.text();
    console.log("API:", text);

    const d = JSON.parse(text);

    if(d.success){
      showToast("✔ " + itemId);
    } else {
      throw new Error("API error");
    }

  } catch(e){
    console.error("SEND FAILED:", e);
    showToast("❌ Failed");
  }
}
</script>

</body>
</html>
