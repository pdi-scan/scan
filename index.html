<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Scanner (External)</title>

<style>
body { margin:0; font-family:-apple-system; background:#111; color:white; text-align:center; }
header { padding:12px; font-weight:800; background:#000; }

input, button {
  width:90%; max-width:420px;
  padding:14px; margin:8px auto;
  border-radius:10px; border:none;
  font-size:16px; font-weight:700;
}

#scanInput { position:absolute; opacity:0; }

/* STATUS */
#status { margin:10px auto; padding:10px 14px; border-radius:12px; font-weight:800; width:fit-content; }
.status-ready   { background:#16a34a; }
.status-stopped { background:#dc2626; }
.status-sync    { background:#ca8a04; }

/* TOAST */
#toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%);
  background:#111827; padding:12px 16px;
  border-radius:10px; font-weight:700;
  opacity:0; transition:0.25s;
}
#toast.show { opacity:1; }

/* HUD */
#hud {
  position:fixed; top:10px; right:10px;
  background:#111827; padding:8px 12px;
  border-radius:10px;
}
#syncBtn {
  margin-left:6px; padding:6px 10px;
  border:none; border-radius:6px;
  background:#2563eb; color:white;
}

/* MODAL */
#modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center;
}
#modalCard {
  background:white; color:black;
  padding:20px; border-radius:12px;
  width:90%; max-width:360px;
}
.modalBtns button { width:100%; margin-top:10px; }

/* LAST SCANS PANEL */
#lastScans {
  max-width:420px;
  margin:12px auto;
  text-align:left;
  background:#1f2937;
  border-radius:12px;
  padding:10px;
}

.scanItem {
  padding:6px 8px;
  border-bottom:1px solid #374151;
  font-family:monospace;
}
.scanItem:last-child { border-bottom:none; }
</style>
</head>

<body>

<header>📦 External Scanner</header>

<div id="status" class="status-stopped">🔴 Stopped</div>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button onclick="clearSession()">Clear</button>

<input id="scanInput" autocomplete="off">

<div id="hud">
  📦 <span id="queueCount">0</span>
  <button id="syncBtn" onclick="flushQueue()">Sync</button>
</div>

<!-- NEW: Last scans -->
<div id="lastScans">
  <b>Last 5 Scans</b>
  <div id="scanList"></div>
</div>

<div id="toast"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalCard">
    <div><b>Pending scans detected</b></div>
    <div id="modalText"></div>

    <div class="modalBtns">
      <button onclick="confirmSyncThenClear()">Sync First</button>
      <button onclick="confirmClearAnyway()">Clear Anyway</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* DOM */
const userEl = document.getElementById("user");
const poEl   = document.getElementById("po");
const qtyEl  = document.getElementById("qty");
const scanInput = document.getElementById("scanInput");
const statusEl = document.getElementById("status");
const scanList = document.getElementById("scanList");

/* STATUS */
function setStatus(type, text){
  statusEl.className = "";
  statusEl.classList.add("status-" + type);
  statusEl.innerText = text;
}

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
  if (navigator.vibrate) navigator.vibrate(80);
}

/* QUEUE */
let queue = JSON.parse(localStorage.getItem("scanQueue") || "[]");

function saveQueue(){
  localStorage.setItem("scanQueue", JSON.stringify(queue));
  updateQueue();
}

function updateQueue(){
  document.getElementById("queueCount").innerText = queue.length;
}
updateQueue();

/* NEW: LAST SCANS STATE */
let lastScans = JSON.parse(localStorage.getItem("lastScans") || "[]");

function renderLastScans(){
  scanList.innerHTML = "";
  lastScans.forEach(item => {
    const div = document.createElement("div");
    div.className = "scanItem";
    div.innerText = "✔ " + item;
    scanList.appendChild(div);
  });
}
renderLastScans();

function addScan(itemId){
  lastScans.unshift(itemId);
  if (lastScans.length > 5) lastScans.pop();
  localStorage.setItem("lastScans", JSON.stringify(lastScans));
  renderLastScans();
}

/* STATE */
let active = false;
let sending = false;

/* AUTO START */
function checkAutoStart(){
  if (userEl.value.trim() && poEl.value.trim()) {
    if (!active) startScanner();
  } else {
    stopScanner();
  }
}
userEl.oninput = poEl.oninput = checkAutoStart;

/* START */
function startScanner(){
  active = true;
  scanInput.focus();
  flushQueue();
  setStatus("ready", "🟢 Ready to Scan");
}

/* STOP */
function stopScanner(){
  active = false;
  scanInput.blur();
  setStatus("stopped", "🔴 Stopped");
}

/* CLEAR */
function clearSession(){
  if (queue.length === 0) {
    doClear();
  } else {
    document.getElementById("modalText").innerText =
      queue.length + " scans have not synced.";
    document.getElementById("modal").style.display = "flex";
  }
}

function doClear(){
  userEl.value = "";
  poEl.value = "";
  qtyEl.value = 1;
  stopScanner();
  showToast("Cleared");
}

/* MODAL */
function closeModal(){ document.getElementById("modal").style.display = "none"; }

async function confirmSyncThenClear(){
  closeModal();
  await flushQueue();
  doClear();
}

function confirmClearAnyway(){
  closeModal();
  queue = [];
  saveQueue();
  doClear();
}

/* KEEP FOCUS */
setInterval(() => {
  if (active && document.activeElement !== scanInput) {
    scanInput.focus();
  }
}, 500);

/* SCAN */
scanInput.addEventListener("keydown", (e) => {
  if (!active) return;

  if (e.key === "Enter") {
    const value = scanInput.value.trim();
    scanInput.value = "";
    if (value) handleScan(value);
  }
});

/* HANDLE */
function handleScan(text){
  if (sending) return;

  sending = true;
  setTimeout(() => sending = false, 300);

  addScan(text); // NEW
  showToast("Scanned: " + text);
  send(text);
}

/* SEND */
async function send(itemId){
  const payload = {
    scanId: crypto.randomUUID(),
    itemId,
    qty: qtyEl.value || 1,
    po: poEl.value || "",
    user: userEl.value || ""
  };

  try {
    const r = await fetch(
      API_URL +
      "?scanId=" + payload.scanId +
      "&itemId=" + itemId +
      "&qty=" + payload.qty +
      "&po=" + payload.po +
      "&user=" + payload.user
    );

    const d = JSON.parse(await r.text());
    if (d.success) {
      showToast("✔ " + itemId);
    } else throw new Error();

  } catch(e){
    queue.push(payload);
    saveQueue();
    showToast("Saved offline");
  }
}

/* SYNC */
async function flushQueue(){

  if (!navigator.onLine || queue.length === 0) return;

  setStatus("sync", "🟡 Syncing...");

  let remaining = [];

  for (const item of queue){
    try {
      const r = await fetch(
        API_URL +
        "?scanId=" + item.scanId +
        "&itemId=" + item.itemId +
        "&qty=" + item.qty +
        "&po=" + item.po +
        "&user=" + item.user
      );

      const d = JSON.parse(await r.text());
      if (!d.success) throw new Error();

    } catch(e){
      remaining.push(item);
    }
  }

  queue = remaining;
  saveQueue();

  setStatus("ready", "🟢 Ready to Scan");
  showToast(queue.length ? "Pending remain" : "Synced");
}

/* AUTO SYNC */
window.addEventListener("online", flushQueue);
window.addEventListener("load", flushQueue);
</script>

</body>
</html>
