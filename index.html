<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system; background:#111; color:white; text-align:center; }
header { padding:12px; font-weight:800; background:#000; }

input, button {
  width:90%; max-width:420px;
  padding:14px; margin:8px auto;
  border-radius:10px; border:none;
  font-size:16px; font-weight:700;
}

#scanInput { position:absolute; opacity:0; }

#status { margin:10px auto; padding:10px; border-radius:12px; font-weight:800; }
.status-ready { background:#16a34a; }
.status-stopped { background:#dc2626; }

#toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%);
  background:#111827; padding:12px;
  border-radius:10px;
  opacity:0;
}
#toast.show { opacity:1; }

#log {
  max-width:420px;
  margin:10px auto;
  text-align:left;
  background:#000;
  padding:10px;
  font-size:12px;
  font-family:monospace;
  height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<header>📦 Scanner</header>

<div id="status" class="status-stopped">🔴 Stopped</div>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1">

<button onclick="clearSession()">Clear</button>
<button onclick="testAPI()">TEST API</button>

<input id="scanInput" autocomplete="off">

<div id="toast"></div>
<div id="log"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* 🔥 HARD DISABLE SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}

/* DOM */
const userEl = document.getElementById("user");
const poEl = document.getElementById("po");
const qtyEl = document.getElementById("qty");
const scanInput = document.getElementById("scanInput");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");

/* LOG */
function log(msg){
  console.log(msg);
  logEl.innerHTML += msg + "<br>";
  logEl.scrollTop = logEl.scrollHeight;
}

/* STATUS */
function setStatus(type,text){
  statusEl.className="";
  statusEl.classList.add("status-"+type);
  statusEl.innerText=text;
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

/* STATE */
let active=false;
let sending=false;
let userLocked=false;

/* AUTO START */
function checkAutoStart(){
  if(userEl.value.trim() && poEl.value.trim()){
    if(!active) startScanner();
  } else stopScanner();
}
userEl.oninput = poEl.oninput = checkAutoStart;

/* START */
function startScanner(){
  active=true;
  scanInput.focus();
  setStatus("ready","🟢 Ready");
}

/* STOP */
function stopScanner(){
  active=false;
  scanInput.blur();
  setStatus("stopped","🔴 Stopped");
}

/* CLEAR */
function clearSession(){
  userEl.value="";
  poEl.value="";
  qtyEl.value=1;

  userLocked=false;
  userEl.readOnly=false;
  userEl.style.opacity="1";

  stopScanner();
  showToast("Cleared");
}

/* LOCK USER */
userEl.addEventListener("focus",()=>{
  if(userLocked){
    userEl.blur();
    showToast("User locked");
  }
});

/* KEEP FOCUS */
setInterval(()=>{
  if(active && document.activeElement!==scanInput){
    scanInput.focus();
  }
},500);

/* SCAN */
scanInput.addEventListener("keydown",(e)=>{
  if(!active) return;

  if(e.key==="Enter"){
    const value=scanInput.value.trim();
    scanInput.value="";
    if(value) handleScan(value);
  }
});

/* HANDLE */
async function handleScan(text){
  if(sending) return;
  sending = true;

  try {

    if(!userLocked){
      userLocked=true;
      userEl.readOnly=true;
      userEl.style.opacity="0.6";
    }

    showToast("Scanned: "+text);
    await send(text);

  } finally {
    sending = false;
  }
}

/* TEST */
async function testAPI(){

  const url = API_URL +
    "?scanId=TEST123" +
    "&itemId=TEST123" +
    "&qty=1" +
    "&po=TEST" +
    "&user=TEST";

  log("TEST URL: " + url);

  try{
    const r = await fetch(url, { cache: "no-store" });
    const text = await r.text();
    log("RESPONSE: " + text);

  } catch(e){
    log("TEST FAILED: " + e);
  }
}

/* SEND */
async function send(itemId){

  const payload = {
    scanId: crypto.randomUUID(),
    itemId,
    qty: qtyEl.value || 1,
    po: poEl.value || "",
    user: userEl.value || ""
  };

  const url =
    API_URL +
    "?scanId=" + encodeURIComponent(payload.scanId) +
    "&itemId=" + encodeURIComponent(payload.itemId) +
    "&qty=" + encodeURIComponent(payload.qty) +
    "&po=" + encodeURIComponent(payload.po) +
    "&user=" + encodeURIComponent(payload.user);

  log("SEND URL: " + url);

  try {
    const r = await fetch(url, { cache: "no-store" });

    log("STATUS: " + r.status);

    const text = await r.text();
    log("RAW: " + text);

    let d;
    try {
      d = JSON.parse(text);
    } catch(e){
      log("❌ NOT JSON");
      return;
    }

    if(d.success){
      showToast("✔ " + itemId);
    } else {
      log("❌ API ERROR: " + text);
    }

  } catch(e){
    log("❌ FETCH FAILED: " + e);
  }
}
</script>

</body>
</html>
